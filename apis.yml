    type: APIReference
  - url: openapi/bank-first-cds-banking-products-openapi.yml
    type: OpenAPI
  description: Consumer-authorized Consumer Data Right payees surface from the DSB
    Consumer Data Standards (CDS Banking API v1.36.0). Covers GET /banking/payees
    (list a customer's saved payees) and GET /banking/payees/{payeeId} (payee
    detail). NOT public - access requires the customer to authorize an Accredited
    Data Recipient under the CDR consent model over the MTLS/FAPI-secured data holder
    channel; this is not an open, self-service endpoint.
