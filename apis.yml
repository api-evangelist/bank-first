aid: bank-first
url: https://raw.githubusercontent.com/api-evangelist/bank-first/refs/heads/main/apis.yml
name: Bank First
kind: company
description: Bank First is an Australian customer-owned mutual bank headquartered in
  Hawthorn East, Victoria. Founded in 1972 as VTU Credit Union by members of the Victorian
  Teachers Union and rebranded from Victoria Teachers Mutual Bank in December 2017,
  it is owned by its 90,000-plus members rather than external shareholders and serves
  the education and healthcare communities with savings, loans, and insurance. As an
  Authorised Deposit-taking Institution, Bank First is a data holder under Australia's
  Consumer Data Right (CDR / Open Banking) and exposes a public, unauthenticated Product
  Reference Data API built to the Data Standards Body Consumer Data Standards, alongside
  an accreditation-gated consumer data sharing surface for Accredited Data Recipients.
