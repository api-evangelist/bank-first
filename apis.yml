apis:
- aid: bank-first:bank-first-cdr-product-reference-data-api
  name: Bank First CDR Product Reference Data API
  tags:
  - CDR
  - Open Banking
  - Product Reference Data
  - Banking Products
  - Australia
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://www.bankfirst.com.au/open-banking
  baseURL: https://public.cdr.bankfirst.com.au/cds-au/v1/banking/products
  properties:
  - url: https://www.bankfirst.com.au/open-banking
    type: Documentation
  - url: https://consumerdatastandardsaustralia.github.io/standards/#banking-products
    type: APIReference
  - url: openapi/bank-first-cds-banking-products-openapi.yml
    type: OpenAPI
  description: Public, unauthenticated Consumer Data Right Product Reference Data (PRD)
    API conforming to the DSB Consumer Data Standards (CDS Banking API v1.36.0). Exposes
    GET /banking/products (a paginated list of Bank First's publicly offered products)
    and GET /banking/products/{productId} (full detail for a single product). Confirmed
    live returning HTTP 200 with x-v 3 and a data.products array of 176 records. No
    authentication or registration is required for this surface.
- aid: bank-first:bank-first-cdr-accounts-balances-api
  name: Bank First CDR Accounts & Balances API
  tags:
  - CDR
  - Open Banking
  - Banking Accounts
  - Account Balances
  - Australia
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://www.bankfirst.com.au/open-banking
  baseURL: https://public.cdr.bankfirst.com.au/cds-au/v1/banking/accounts
  properties:
  - url: https://www.bankfirst.com.au/open-banking
    type: Documentation
  - url: https://consumerdatastandardsaustralia.github.io/standards/#banking-accounts
    type: APIReference
  - url: openapi/bank-first-cds-banking-products-openapi.yml
    type: OpenAPI
  description: Consumer-authorized Consumer Data Right accounts and balances surface
    from the DSB Consumer Data Standards (CDS Banking API v1.36.0), which Bank First
    is legally required to implement as a Data Holder. Covers GET /banking/accounts
    (list authorized accounts), GET /banking/accounts/balances and POST
    /banking/accounts/balances (bulk balances), GET /banking/accounts/{accountId}/balance
    (single balance), and GET /banking/accounts/{accountId} (account detail). NOT
    public - access requires a customer to authorize an Accredited Data Recipient
    through the CDR consent and MTLS/FAPI security profile; this is not an open,
    self-service endpoint.
- aid: bank-first:bank-first-cdr-transactions-api
  name: Bank First CDR Transactions API
  tags:
  - CDR
  - Open Banking
  - Banking Transactions
  - Account Transactions
  - Australia
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://www.bankfirst.com.au/open-banking
  baseURL: https://public.cdr.bankfirst.com.au/cds-au/v1/banking/accounts
  properties:
  - url: https://www.bankfirst.com.au/open-banking
    type: Documentation
  - url: https://consumerdatastandardsaustralia.github.io/standards/#banking-transactions
    type: APIReference
  - url: openapi/bank-first-cds-banking-products-openapi.yml
    type: OpenAPI
  description: Consumer-authorized Consumer Data Right transactions surface from the
    DSB Consumer Data Standards (CDS Banking API v1.36.0). Covers GET
    /banking/accounts/{accountId}/transactions (list transactions for an authorized
    account, with filtering) and GET
    /banking/accounts/{accountId}/transactions/{transactionId} (transaction detail).
    NOT public - access requires the customer to authorize an Accredited Data
    Recipient under the CDR consent model over the MTLS/FAPI-secured data holder
    channel.
- aid: bank-first:bank-first-cdr-direct-debits-scheduled-payments-api
  name: Bank First CDR Direct Debits & Scheduled Payments API
  tags:
  - CDR
  - Open Banking
  - Direct Debits
  - Scheduled Payments
  - Australia
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://www.bankfirst.com.au/open-banking
  baseURL: https://public.cdr.bankfirst.com.au/cds-au/v1/banking/accounts
  properties:
  - url: https://www.bankfirst.com.au/open-banking
    type: Documentation
  - url: https://consumerdatastandardsaustralia.github.io/standards/#banking-direct-debits
    type: APIReference
  - url: openapi/bank-first-cds-banking-products-openapi.yml
    type: OpenAPI
  description: Consumer-authorized Consumer Data Right direct debits and scheduled
    payments surface from the DSB Consumer Data Standards (CDS Banking API v1.36.0).
    Covers GET /banking/accounts/{accountId}/direct-debits and POST
    /banking/accounts/direct-debits (bulk), plus GET
    /banking/accounts/{accountId}/payments/scheduled and POST
    /banking/payments/scheduled (bulk scheduled payments). NOT public - access
    requires customer authorization of an Accredited Data Recipient under the CDR
    consent model over the MTLS/FAPI-secured data holder channel.
